/* ══ LOGS ══ */
async function cargarLogs(){
  const user=getUser(); if(!user)return;
  try{
    const{data,error}=await getClient().from("consulta_logs").select("id,ts,total,fallos,error_msg").eq("user_id",user.id).order("ts",{ascending:false}).limit(200);
    if(!error)logs=(data||[]).map(r=>({id:r.id,ts:r.ts,total:r.total,fallos:r.fallos,error:r.error_msg}));
  }catch{}
}
async function guardarLog(entry){
  const user=getUser(); if(!user)return;
  const local={id:null,ts:entry.ts,total:entry.total,fallos:entry.fallos,error:entry.error||null};
  logs.unshift(local); if(logs.length>200)logs=logs.slice(0,200);
  if(filtro==="notif_consulta")renderLogs();
  try{
    const{data,error}=await getClient().from("consulta_logs").insert({user_id:user.id,ts:entry.ts,total:entry.total,fallos:entry.fallos,error_msg:entry.error||null}).select("id,ts,total,fallos,error_msg").single();
    if(!error&&data){local.id=data.id;local.ts=data.ts;}
  }catch{}
}

function renderLogs(){
  const listEl=document.getElementById("mon-list"),pagEl=document.getElementById("mon-pag"); if(!listEl)return;
  if(!logs.length){listEl.innerHTML=`<div class="empty">${IC.alert}<h3>Sin notificaciones</h3><p>El historial se genera cada vez que se verifica un proceso.</p></div>`;if(pagEl)pagEl.innerHTML="";return;}
  const totPags=Math.max(1,Math.ceil(logs.length/LOGS_PER));
  if(logsPag>totPags)logsPag=totPags;
  const desde=(logsPag-1)*LOGS_PER,pag=logs.slice(desde,desde+LOGS_PER);
  listEl.innerHTML=`<div class="logs-wrap">
    <div class="logs-hdr">${IC.alert} Historial de verificaciones — ${logs.length} registros <button class="logs-clr" id="logs-clr">Limpiar</button></div>
    <div>${pag.map(log=>{
      const fecha=new Date(log.ts).toLocaleString("es-CO",{dateStyle:"medium",timeStyle:"short"});
      const err=log.fallos>0||log.error;
      const tit=err?`${log.fallos} de ${log.total} proceso(s) no verificados`:`${log.total} proceso(s) verificados`;
      const det=log.error||(err?"No se pudieron verificar.":"");
      return `<div class="log-row"><div class="log-dot ${err?"log-dot-err":"log-dot-ok"}"></div><div class="log-body"><div class="log-fecha">${fecha}</div><div class="log-tit">${escHtml(tit)}</div>${det?`<div class="log-det">${escHtml(det)}</div>`:""}</div><div class="log-badge ${err?"log-badge-err":"log-badge-ok"}">${err?"Error":"OK"}</div></div>`;
    }).join("")}</div>
  </div>`;
  document.getElementById("logs-clr")?.addEventListener("click",async()=>{
    if(!confirm("¿Limpiar historial?"))return;
    const user=getUser();
    if(user){try{await getClient().from("consulta_logs").delete().eq("user_id",user.id);}catch{}}
    logs=[]; logsPag=1; renderLogs();
  });
  if(!pagEl)return;
  if(totPags<=1){pagEl.innerHTML="";return;}
  const d2=desde+1,h=Math.min(logsPag*LOGS_PER,logs.length);
  let btns="";
  paginasVis(logsPag,totPags).forEach(p=>{ if(p==="…")btns+=`<span class="pag-ell">…</span>`; else btns+=`<button class="pag-btn ${p===logsPag?"act":""}" data-lp="${p}">${p}</button>`; });
  pagEl.innerHTML=`<div class="pag-info">${d2}–${h} de ${logs.length}</div><div class="pag-ctrl"><button class="pag-btn" id="lp-prev" ${logsPag===1?"disabled":""}>${IC.chevLeft}</button>${btns}<button class="pag-btn" id="lp-next" ${logsPag===totPags?"disabled":""}>${IC.chevRight}</button></div>`;
  pagEl.querySelectorAll(".pag-btn[data-lp]").forEach(b=>b.addEventListener("click",()=>{logsPag=+b.dataset.lp;renderLogs();scrollTop();}));
  pagEl.querySelector("#lp-prev")?.addEventListener("click",()=>{logsPag--;renderLogs();scrollTop();});
  pagEl.querySelector("#lp-next")?.addEventListener("click",()=>{logsPag++;renderLogs();scrollTop();});
}

/* ══ EXCEL EXPORT ══ */
async function exportarExcel(){
  if(!seguimientos.length){showToast("No hay procesos para exportar.","error");return;}
  const btn=document.getElementById("sb-excel");
  if(btn){btn.disabled=true;btn.innerHTML=`${IC.spinner} Preparando…`;}
  try{
    if(!window.ExcelJS){
      await new Promise((res,rej)=>{
        const s=document.createElement("script");
        s.src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js";
        s.onload=()=>window.ExcelJS?res():rej(new Error("ExcelJS no disponible"));
        s.onerror=()=>rej(new Error("No se pudo cargar ExcelJS"));
        document.head.appendChild(s);
      });
    }
    const wb=new window.ExcelJS.Workbook();
    wb.creator="Minutas Legales Colombia";
    wb.created=new Date();
    const ws=wb.addWorksheet("Procesos",{views:[{state:"frozen",xSplit:0,ySplit:3}]});

    /* ── Colores corporativos ── */
    const C_BRAND="FF1E3A5F";   /* azul oscuro */
    const C_HDR  ="FF2563A8";   /* azul medio */
    const C_ALT  ="FFEFF6FF";   /* azul muy claro */
    const C_WHITE="FFFFFFFF";
    const C_ALERT={Alta:"FFFCA5A5",Media:"FFFDE68A",Baja:"FFD1FAE5",Normal:C_WHITE};
    const C_ALERT_TXT={Alta:"FF991B1B",Media:"FF92400E",Baja:"FF14532D",Normal:"FF374151"};

    /* ── Fila 1: cabecera marca ── */
    ws.mergeCells("A1:J1");
    const f1=ws.getCell("A1");
    f1.value="📋 MONITOREO JURÍDICO — Minutas Legales Colombia";
    f1.font={bold:true,size:13,color:{argb:C_WHITE}};
    f1.fill={type:"pattern",pattern:"solid",fgColor:{argb:C_BRAND}};
    f1.alignment={horizontal:"center",vertical:"middle"};
    ws.getRow(1).height=26;

    /* ── Fila 2: fecha ── */
    ws.mergeCells("A2:J2");
    const f2=ws.getCell("A2");
    f2.value=`Exportado el ${new Date().toLocaleString("es-CO",{dateStyle:"full",timeStyle:"short"})}  ·  ${seguimientos.length} proceso(s)`;
    f2.font={italic:true,size:9,color:{argb:"FF6B7280"}};
    f2.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFF9FAFB"}};
    f2.alignment={horizontal:"center",vertical:"middle"};
    ws.getRow(2).height=16;

    /* ── Fila 3: encabezados de columna ── */
    const cols=["Radicado","Alias","Tipo de proceso","Despacho","Demandante","Demandado","Estado","Días sin actuación","Última actuación","Última consulta"];
    const widths=[28,20,28,36,30,30,14,14,16,18];
    ws.addRow(cols);
    const hdrRow=ws.getRow(3);
    hdrRow.height=20;
    hdrRow.eachCell(cell=>{
      cell.font={bold:true,size:9,color:{argb:C_WHITE}};
      cell.fill={type:"pattern",pattern:"solid",fgColor:{argb:C_HDR}};
      cell.alignment={horizontal:"center",vertical:"middle",wrapText:false};
      cell.border={bottom:{style:"medium",color:{argb:"FF1D4ED8"}}};
    });
    cols.forEach((_,i)=>{ ws.getColumn(i+1).width=widths[i]; });

    /* ── Filas de datos ── */
    seguimientos.forEach((s,idx)=>{
      let dem="",dem2="";
      if(s.sujetos){const l=s.sujetos.split(/\r?\n/);dem=(l[0]||"").trim();dem2=l.slice(1).join(" ").replace(/^\t+/,"").trim();}
      const clase=clasificar(s);
      const dias=s.ultima_actuacion?Math.floor((Date.now()-new Date(s.ultima_actuacion))/86400000):"";
      const uAct=s.ultima_actuacion?new Date(s.ultima_actuacion).toLocaleDateString("es-CO"):"";
      const uCon=s.ultimo_chequeo?new Date(s.ultimo_chequeo).toLocaleString("es-CO"):"";

      const row=ws.addRow([s.radicado||"",s.alias||"",s.nombre_proceso||"",s.despacho||"",dem,dem2,clase,dias,uAct,uCon]);
      row.height=16;
      const alt=idx%2===0;
      const bgArgb=alt?C_ALT:C_WHITE;

      /* Estado col (G=7): color según urgencia */
      const urgencia=typeof dias==="number"&&dias>45?"Alta":typeof dias==="number"&&dias>20?"Media":typeof dias==="number"?"Baja":"Normal";
      const urgFg=C_ALERT[urgencia]||C_WHITE;
      const urgTxt=C_ALERT_TXT[urgencia]||"FF374151";

      row.eachCell((cell,col)=>{
        cell.font={size:8,color:{argb:col===7?urgTxt:"FF374151"}};
        cell.fill={type:"pattern",pattern:"solid",fgColor:{argb:col===7?urgFg:bgArgb}};
        cell.alignment={vertical:"middle",wrapText:false};
        if(col===1)cell.font={...cell.font,bold:true,color:{argb:"FF1E3A5F"}};
        if(col===8){cell.alignment={...cell.alignment,horizontal:"center"};if(typeof dias==="number"&&dias>45)cell.font={...cell.font,bold:true};}
      });
    });

    /* ── Auto-filter en cabecera ── */
    ws.autoFilter={from:{row:3,column:1},to:{row:3,column:cols.length}};

    /* ── Hoja de resumen KPI ── */
    const ws2=wb.addWorksheet("Resumen");
    ws2.getColumn(1).width=30; ws2.getColumn(2).width=18;
    const addKpi=(label,val)=>{
      const r=ws2.addRow([label,val]);
      r.getCell(1).font={size:9,color:{argb:"FF374151"}};
      r.getCell(2).font={bold:true,size:9,color:{argb:C_BRAND}};
      r.getCell(2).alignment={horizontal:"right"};
    };
    ws2.addRow(["📊 RESUMEN ESTADÍSTICO"]);
    ws2.getRow(ws2.rowCount).getCell(1).font={bold:true,size:11,color:{argb:C_BRAND}};
    ws2.addRow([]);
    const urgentes=seguimientos.filter(s=>s.ultima_actuacion&&Math.floor((Date.now()-new Date(s.ultima_actuacion))/86400000)>45).length;
    const atencion=seguimientos.filter(s=>s.ultima_actuacion&&Math.floor((Date.now()-new Date(s.ultima_actuacion))/86400000)>20&&Math.floor((Date.now()-new Date(s.ultima_actuacion))/86400000)<=45).length;
    addKpi("Total de procesos en monitoreo",seguimientos.length);
    addKpi("Procesos urgentes (>45 días sin actuación)",urgentes);
    addKpi("Procesos con atención pronta (20-45 días)",atencion);
    addKpi("Procesos activos al día",seguimientos.length-urgentes-atencion);
    addKpi("Fecha de exportación",new Date().toLocaleDateString("es-CO",{dateStyle:"long"}));

    /* ── Descargar ── */
    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url;
    a.download=`MonitoreoJuridico_${new Date().toISOString().slice(0,10)}.xlsx`;
    a.click(); setTimeout(()=>URL.revokeObjectURL(url),1000);
    showToast(`${seguimientos.length} proceso(s) exportados a Excel.`,"ok");
  }catch(err){
    showToast("Error al exportar: "+err.message,"error");
  }finally{
    if(btn){btn.disabled=false;btn.innerHTML=`${IC.save} Exportar Excel`;}
  }
}
